<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control</title>
    <style>
        :root {
            --bg-color: #0a0a0f;
            --bg-secondary: #12121a;
            --accent-color: #ffffff;
            --glow-working: #00ff88;
            --glow-idle: #666666;
            --glow-thinking: #ffaa00;
            --glow-error: #ff4444;
            --hub-glow: #00d4ff;
            --line-color: #2a2a3a;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --mono-font: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--line-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .header h1 span { color: var(--hub-glow); text-shadow: 0 0 10px var(--hub-glow); }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glow-working);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 5px var(--glow-working); }
            50% { opacity: 0.6; box-shadow: 0 0 15px var(--glow-working); }
        }

        /* Main 3-column layout */
        .main-container {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 15px;
            padding: 15px;
            overflow: hidden;
        }

        /* Left column - Agent list */
        .agents-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .agents-column h2 {
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .agent-card {
            background: var(--bg-secondary);
            border: 1px solid var(--line-color);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .agent-card:hover {
            border-color: var(--hub-glow);
            background: rgba(0, 212, 255, 0.05);
        }

        .agent-card.working { border-left: 3px solid var(--glow-working); }
        .agent-card.idle { border-left: 3px solid var(--glow-idle); }
        .agent-card.thinking { border-left: 3px solid var(--glow-thinking); }
        .agent-card.error { border-left: 3px solid var(--glow-error); }

        .agent-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.75rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .agent-avatar-small.working { background: rgba(0, 255, 136, 0.1); color: var(--glow-working); }
        .agent-avatar-small.idle { background: rgba(102, 102, 102, 0.1); color: var(--glow-idle); }
        .agent-avatar-small.thinking { background: rgba(255, 170, 0, 0.1); color: var(--glow-thinking); animation: thinkingGlow 1s ease-in-out infinite; }
        .agent-avatar-small.error { background: rgba(255, 68, 68, 0.1); color: var(--glow-error); }

        @keyframes thinkingGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 170, 0, 0.5); }
            50% { box-shadow: 0 0 15px rgba(255, 170, 0, 0.8); }
        }

        .agent-info-small {
            flex: 1;
            min-width: 0;
        }

        .agent-info-small h3 {
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .agent-status-small {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .agent-status-small.working { color: var(--glow-working); }
        .agent-status-small.idle { color: var(--glow-idle); }
        .agent-status-small.thinking { color: var(--glow-thinking); }
        .agent-status-small.error { color: var(--glow-error); }

        .agent-task-small {
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* Center column - HAL-9000 Hub */
        .hub-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hub {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a1a2e, var(--bg-color));
            border: 2px solid var(--hub-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: hubPulse 3s ease-in-out infinite;
            position: relative;
        }

        @keyframes hubPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 60px rgba(0, 212, 255, 0.7); }
        }

        .hub-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--hub-glow);
            text-shadow: 0 0 30px var(--hub-glow);
        }

        .hub-label {
            margin-top: 20px;
            font-size: 1rem;
            color: var(--hub-glow);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .hub-status {
            margin-top: 10px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Right column - Stats, Projects, Activity */
        .info-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow: hidden;
        }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--line-color);
            border-radius: 8px;
            padding: 12px;
        }

        .panel h2 {
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 6px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 300;
            color: var(--hub-glow);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Projects */
        .project-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--line-color);
        }

        .project-item:last-child { border-bottom: none; }

        .project-name {
            font-size: 0.8rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-percent { font-size: 0.75rem; color: var(--glow-working); }

        .project-progress {
            height: 4px;
            background: var(--line-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .project-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--hub-glow), var(--glow-working));
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        /* Activity Log */
        .log-container {
            flex: 1;
            overflow-y: auto;
            font-family: var(--mono-font);
            font-size: 0.75rem;
            max-height: 150px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(42, 42, 58, 0.5);
            display: flex;
            gap: 8px;
            line-height: 1.3;
        }

        .log-time { color: var(--text-secondary); white-space: nowrap; }
        .log-agent { color: var(--hub-glow); white-space: nowrap; }
        .log-action { color: var(--text-primary); }
        .log-entry.success .log-action { color: var(--glow-working); }
        .log-entry.error .log-action { color: var(--glow-error); }
        .log-entry.warning .log-action { color: var(--glow-thinking); }

        .last-update {
            text-align: center;
            padding: 5px;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--line-color); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <header class="header">
        <h1><span>●</span> Mission Control</h1>
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span>System Online</span>
        </div>
    </header>

    <div class="main-container">
        <!-- Left: Agent List -->
        <div class="agents-column" id="agentsColumn">
            <h2>Agents</h2>
            <!-- Agents will be inserted here -->
        </div>

        <!-- Center: HAL-9000 Hub -->
        <div class="hub-column">
            <div class="hub" id="hub">
                <div class="hub-inner">H</div>
            </div>
            <div class="hub-label">HAL-9000</div>
            <div class="hub-status" id="hubStatus">Orchestrator Online</div>
        </div>

        <!-- Right: Stats, Projects, Activity -->
        <div class="info-column">
            <!-- Stats -->
            <div class="panel">
                <h2>📊 System Stats</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="statActive">0</div>
                        <div class="stat-label">Active</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statIdle">0</div>
                        <div class="stat-label">Idle</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statProjects">0</div>
                        <div class="stat-label">Projects</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="statTasks">0</div>
                        <div class="stat-label">Tasks Done</div>
                    </div>
                </div>
            </div>

            <!-- Projects -->
            <div class="panel">
                <h2>📁 Projects</h2>
                <div id="projectsList">
                    <!-- Projects will be inserted here -->
                </div>
            </div>

            <!-- Activity Log -->
            <div class="panel" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                <h2>📝 Activity Log</h2>
                <div class="log-container" id="activityLog">
                    <!-- Logs will be inserted here -->
                </div>
                <div class="last-update" id="lastUpdate">Last update: Never</div>
            </div>
        </div>
    </div>

    <script>
        async function updateDashboard(data) {
            const agents = Object.values(data.agents || {});
            let activeCount = 0;
            let idleCount = 0;
            let totalTasks = 0;

            // Update agents column
            const agentsColumn = document.getElementById('agentsColumn');
            // Keep the header, remove old agents
            const header = agentsColumn.querySelector('h2');
            agentsColumn.innerHTML = '';
            agentsColumn.appendChild(header);

            agents.forEach(agent => {
                if (agent.status === 'working' || agent.status === 'thinking') activeCount++;
                if (agent.status === 'idle') idleCount++;
                totalTasks += agent.tasks_completed || 0;

                const card = createAgentCard(agent);
                agentsColumn.appendChild(card);
            });

            // Update stats
            document.getElementById('statActive').textContent = activeCount;
            document.getElementById('statIdle').textContent = idleCount;
            document.getElementById('statProjects').textContent = Object.keys(data.projects || {}).length;
            document.getElementById('statTasks').textContent = totalTasks;
            document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString();

            // Update hub status
            const hubStatus = document.getElementById('hubStatus');
            if (activeCount > 0) {
                hubStatus.textContent = `Managing ${activeCount} active agent${activeCount !== 1 ? 's' : ''}`;
                hubStatus.style.color = 'var(--glow-working)';
            } else {
                hubStatus.textContent = 'All agents idle';
                hubStatus.style.color = 'var(--text-secondary)';
            }

            // Update projects
            updateProjects(data.projects || {});

            // Update activity log
            updateActivityLog(data);
        }

        function createAgentCard(agent) {
            const card = document.createElement('div');
            card.className = `agent-card ${agent.status}`;
            
            const initial = agent.name.substring(0, 1).toUpperCase();
            const statusText = agent.status === 'working' ? '● Working' : 
                              agent.status === 'thinking' ? '● Thinking' :
                              agent.status === 'error' ? '● Error' : '● Idle';
            const taskText = agent.task || 'No active task';

            card.innerHTML = `
                <div class="agent-avatar-small ${agent.status}">${initial}</div>
                <div class="agent-info-small">
                    <h3>${agent.name}</h3>
                    <div class="agent-status-small ${agent.status}">${statusText}</div>
                    <div class="agent-task-small">${taskText}</div>
                </div>
            `;

            return card;
        }

        function updateProjects(projects) {
            const container = document.getElementById('projectsList');
            container.innerHTML = '';

            Object.values(projects).forEach(project => {
                const item = document.createElement('div');
                item.className = 'project-item';
                item.innerHTML = `
                    <div class="project-name">
                        <span>${project.name}</span>
                        <span class="project-percent">${project.progress}%</span>
                    </div>
                    <div class="project-progress">
                        <div class="project-progress-bar" style="width: ${project.progress}%;"></div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // Load project logs from copied log files
        async function loadProjectLogs(projectName) {
            try {
                const response = await fetch(`${projectName}-logs.txt?` + Date.now());
                if (!response.ok) return [];
                
                const text = await response.text();
                return text.trim().split('\n').filter(line => line).map(line => {
                    // Parse log line: [HH:MM:SS] [LEVEL] Agent: Action | {details}
                    const match = line.match(/\[(\d{2}:\d{2}:\d{2})\] \[(\w+)\] ([^:]+): (.+)/);
                    if (match) {
                        const [, time, level, agent, action] = match;
                        const type = level === 'ERROR' ? 'error' : level === 'SUCCESS' ? 'success' : '';
                        return { time, agent: agent.trim(), action: action.split(' | ')[0], type };
                    }
                    return null;
                }).filter(entry => entry);
            } catch (e) {
                return [];
            }
        }

        async function updateActivityLog(data) {
            const container = document.getElementById('activityLog');
            
            // Get logs from all active projects
            const projectNames = Object.keys(data.projects || {});
            let allLogs = [];
            
            for (const projectName of projectNames) {
                const logs = await loadProjectLogs(projectName);
                allLogs = allLogs.concat(logs);
            }
            
            // Also add current agent tasks
            Object.values(data.agents || {}).forEach(agent => {
                if (agent.last_active && agent.task && agent.status !== 'idle') {
                    const time = new Date(agent.last_active).toLocaleTimeString('en-US', { 
                        hour12: false, 
                        hour: '2-digit', 
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    
                    let type = '';
                    if (agent.status === 'error') type = 'error';
                    else if (agent.status === 'working' || agent.status === 'thinking') type = '';
                    
                    allLogs.push({ time, agent: agent.name, action: agent.task, type });
                }
            });
            
            // Sort by time and take last 10
            allLogs.sort((a, b) => b.time.localeCompare(a.time));
            
            if (allLogs.length === 0) {
                container.innerHTML = '<div style="color: var(--text-secondary); padding: 10px;">No recent activity</div>';
                return;
            }

            container.innerHTML = allLogs.slice(0, 10).map(log => `
                <div class="log-entry ${log.type}">
                    <span class="log-time">${log.time}</span>
                    <span class="log-agent">${log.agent}</span>
                    <span class="log-action">${log.action}</span>
                </div>
            `).join('');
        }

        // Load data immediately and then every 2 seconds
        loadData();
        setInterval(loadData, 2000);
        
        async function loadData() {
            try {
                const response = await fetch('agent-state.json?' + Date.now());
                if (!response.ok) throw new Error('State file not found');
                
                const data = await response.json();
                await updateDashboard(data);
            } catch (error) {
                console.log('Could not load state file:', error);
            }
        }
    </script>
</body>
</html>
